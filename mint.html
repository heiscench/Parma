    <section id="mint">
        <h1>Mint</h1>
        <div class="mint-terminal">
            <p>> CONNECT WALLET</p>
            <button class="btn">Connect Wallet</button>
            <p>Wallet Connected: 0xA4F...91</p>
            <p>> SELECT MINT QUANTITY</p>
            <div class="quantity-selector">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>
            <p>> EXECUTE MINT</p>
            <button class="btn">INITIATE PARMA MINT</button>
            <div class="mint-progress">
                <p>Supply: 10,000</p>
                <p>Mint Price: 0.06 ETH</p>
                <p>Minted: 3,452 / 10,000</p>
            </div>
        </div>
